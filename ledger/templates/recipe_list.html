{% extends 'base.html' %}
{% load static %}
{% block title %}Recipe List{% endblock %}
{% block heading %}Page: Recipe List{% endblock %}
{% block content %}
    {% for recipe in recipes %}
    <ul>
            <div><a href="{% url 'ledger:recipe_detail' recipe.id %}">{{recipe.name}}</a></div>
    </ul>
    {% endfor %}
    {% if request.user.is_authenticated %}
    <div><a href ="{% url 'ledger:add_recipe' %}"> Add New Recipe </a></div>
    {% endif %}
{% endblock %}
